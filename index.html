<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literacy Portal</title>
    <style>
        :root { 
            --primary: #004a99; /* School Blue */
            --dark: #001a3d; 
            --light: #f8fafc;
            --accent: #10b981;
            --error: #ef4444;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--light); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Windows Custom Title Bar */
        #title-bar { 
            height: 38px; 
            background: var(--dark); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            -webkit-app-region: drag; 
            color: white; 
            padding: 0 15px; 
            font-size: 13px;
            letter-spacing: 1px;
        }

        #window-controls { -webkit-app-region: no-drag; }
        #window-controls button { 
            background: none; 
            border: none; 
            color: white; 
            cursor: pointer; 
            padding: 8px 12px; 
            font-size: 16px; 
            transition: 0.2s;
        }
        #close-btn:hover { background: var(--error); }

        /* Main Layout */
        .main-content { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }

        .auth-card { 
            background: white; 
            padding: 45px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: var(--dark); margin-bottom: 10px; font-weight: 700; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }

        /* Form Styling */
        .input-group { text-align: left; margin-bottom: 18px; }
        label { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; }
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,74,153,0.1); }

        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 15px; 
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn:hover { background: #003d80; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-setup { background: #64748b; }
        .btn-setup:hover { background: #475569; }

        .hidden { display: none !important; }
        #error-label { color: var(--error); font-size: 13px; margin-top: 15px; min-height: 20px; font-weight: 500; }

        .logo-placeholder {
            font-size: 40px;
            margin-bottom: 15px;
            display: inline-block;
        }
    </style>
</head>
<body onload="startupCheck()">

    <div id="title-bar">
        <span>Reader Pro</span>
        <div id="window-controls">
            <button onclick="window.api.minimize()">—</button>
            <button id="close-btn" onclick="window.api.close()">×</button>
        </div>
    </div>

    <div class="main-content">
        
        <div id="view-setup" class="auth-card hidden">
            <div class="logo-placeholder">📁</div>
            <h2>Database Setup</h2>
            <p>Please select the school's shared network folder or local data directory to continue.</p>
            <button class="btn btn-setup" onclick="runSetup()">Connect School Folder</button>
        </div>

        <div id="view-login" class="auth-card hidden">
            <div class="logo-placeholder">📖</div>
            <h2>Portal Sign-In</h2>
            <p>Enter your registered email address and password.</p>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="user-email" placeholder="your.email@school.com" autofocus>
            </div>
            
            <div class="input-group">
                <label>Access Password</label>
                <input type="password" id="user-pass" placeholder="Enter your password">
            </div>

            <button class="btn" onclick="performLogin()">Enter Portal</button>
            <p id="error-label"></p>
            
            <div style="margin-top: 20px; font-size: 11px; color: #cbd5e1;">
                Connected to: <span id="connected-path">...</span>
                <br><span style="cursor: pointer; text-decoration: underline;" onclick="clearPath()">Change Folder</span>
            </div>
        </div>

    </div>

    <script>
        const errorDisplay = document.getElementById('error-label');

        /**
         * 1. On Startup: Check if we already have a saved folder path
         */
        async function startupCheck() {
            const savedPath = localStorage.getItem('dbPath');
            if (savedPath) {
                const res = await window.api.connectSilent(savedPath);
                if (res.success) {
                    showLoginView(savedPath);
                    return;
                }
            }
            // If no path or path failed, show setup
            document.getElementById('view-setup').classList.remove('hidden');
        }

        /**
         * 2. Manual Setup: Triggered by button click
         */
        async function runSetup() {
            const res = await window.api.setupDatabase();
            if (res.success) {
                localStorage.setItem('dbPath', res.path);
                showLoginView(res.path);
            }
        }

        function showLoginView(path) {
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('connected-path').innerText = path.split('\\').pop(); // Show folder name only
        }

        /**
         * 3. Login Process - No domain restriction, just check if email exists in database
         */
        async function performLogin() {
            const email = document.getElementById('user-email').value.trim().toLowerCase();
            const password = document.getElementById('user-pass').value;

            if (!email) {
                errorDisplay.innerText = "Please enter your email address.";
                return;
            }

            const res = await window.api.attemptLogin({ email, password });

            if (res.success) {
                // Store student data in Session Storage (clears when app closes)
                if (res.role === 'learner') {
                    sessionStorage.setItem('student', JSON.stringify(res.studentData));
                }
                window.api.switchPage(res.page);
            } else {
                errorDisplay.innerText = res.message;
            }
        }

        /**
         * 4. Utility: Reset the folder connection
         */
        function clearPath() {
            if(confirm("Disconnect from current database folder?")) {
                localStorage.removeItem('dbPath');
                location.reload();
            }
        }
    </script>
</body>
</html>
